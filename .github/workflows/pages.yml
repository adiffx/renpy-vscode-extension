# Build and deploy GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build HTML from Markdown
        run: |
          mkdir -p _site
          npm install marked
          node -e "
            const fs = require('fs');
            const { marked } = require('marked');
            const readme = fs.readFileSync('README.md', 'utf8');
            const html = \`<!DOCTYPE html>
          <html lang=\"en\">
          <head>
            <meta charset=\"UTF-8\">
            <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
            <title>Ren'Py Magic - VS Code Extension</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; max-width: 900px; margin: 0 auto; padding: 2rem; line-height: 1.6; color: #333; }
              h1, h2, h3 { color: #2c3e50; }
              h1 { border-bottom: 2px solid #3498db; padding-bottom: 0.5rem; }
              h2 { border-bottom: 1px solid #eee; padding-bottom: 0.3rem; margin-top: 2rem; }
              code { background: #f4f4f4; padding: 0.2rem 0.4rem; border-radius: 3px; font-size: 0.9em; }
              pre { background: #2d2d2d; color: #f8f8f2; padding: 1rem; border-radius: 5px; overflow-x: auto; }
              pre code { background: none; padding: 0; color: inherit; }
              a { color: #3498db; }
              ul { padding-left: 1.5rem; }
              li { margin: 0.3rem 0; }
            </style>
          </head>
          <body>
          \${marked.parse(readme)}
          </body>
          </html>\`;
            fs.writeFileSync('_site/index.html', html);
          "

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
